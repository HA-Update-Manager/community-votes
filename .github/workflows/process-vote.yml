name: Process vote

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'vote')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;
            const author = issue.user.login;

            async function comment(body) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issue.number, body,
              });
            }

            async function closeIssue() {
              await github.rest.issues.update({
                owner, repo, issue_number: issue.number, state: "closed",
              });
            }

            async function readJson(path) {
              try {
                const res = await github.rest.repos.getContent({ owner, repo, path });
                const content = Buffer.from(res.data.content, "base64").toString("utf8");
                return JSON.parse(content);
              } catch (err) {
                if (err.status === 404) return null;
                throw err;
              }
            }

            async function writeJson(path, data, message) {
              let sha;
              try {
                const existing = await github.rest.repos.getContent({ owner, repo, path });
                sha = existing.data.sha;
              } catch (err) {
                if (err.status !== 404) throw err;
              }
              const content = Buffer.from(JSON.stringify(data, null, 2) + "\n").toString("base64");
              await github.rest.repos.createOrUpdateFileContents({
                owner, repo, path, message, content, sha,
              });
            }

            async function listDir(path) {
              try {
                const res = await github.rest.repos.getContent({ owner, repo, path });
                return Array.isArray(res.data) ? res.data : [];
              } catch (err) {
                if (err.status === 404) return [];
                throw err;
              }
            }

            // Issue Forms render each field as "### Label" followed by the
            // answer (or "_No response_" for an empty optional field). Labels
            // are kept deliberately clean in vote.yml (no parenthetical
            // instructions in the label text itself) so this split stays
            // simple.
            function parseFields(body) {
              const fields = {};
              const blocks = body.split(/\n(?=### )/);
              for (const block of blocks) {
                const m = block.match(/^### (.+?)\n([\s\S]*)$/);
                if (!m) continue;
                const label = m[1].trim();
                let value = m[2].trim();
                if (value === "_No response_") value = "";
                fields[label] = value;
              }
              return fields;
            }

            // --- 1. Banned check ---
            const banned = (await readJson("moderation/banned-users.json")) || [];
            if (banned.map((u) => u.toLowerCase()).includes(author.toLowerCase())) {
              await comment("This account is not allowed to submit votes.");
              await closeIssue();
              return;
            }

            // A leading v/V immediately before a digit is stripped, so a
            // human-typed "1.2.3" and one derived from a GitHub release tag
            // "v1.2.3" land on the exact same vote path either way. Kept in
            // sync with ha-update-manager's own hacs_identity.py, found
            // live 2026-07-22 (see that module's own comment for how this
            // was discovered).
            function normalizeVersion(version) {
              const m = version.match(/^[vV](\d.*)$/);
              return m ? m[1] : version;
            }

            // --- 2. Parse ---
            const fields = parseFields(issue.body || "");
            const category = (fields["Category"] || "").trim();
            const version = normalizeVersion((fields["Version"] || "").trim());
            const verdict = (fields["Verdict"] || "").trim();
            const reasonCategory = (fields["Reason category"] || "").trim();

            const VALID_CATEGORIES = ["home-assistant", "hacs", "devices", "apps"];
            const VALID_VERDICTS = ["healthy", "problematic"];
            const VALID_REASONS = [
              "broken functionality",
              "requires a newer HA version",
              "is a dev/pre-release build",
              "breaking change",
              "other",
            ];

            async function reject(reason) {
              await comment(`This vote could not be processed: ${reason}`);
              await closeIssue();
            }

            if (!VALID_CATEGORIES.includes(category)) {
              await reject(`unknown category "${category}".`);
              return;
            }
            if (!version) {
              await reject("version is missing.");
              return;
            }
            if (!VALID_VERDICTS.includes(verdict)) {
              await reject(`unknown verdict "${verdict}".`);
              return;
            }
            if (verdict === "problematic" && !VALID_REASONS.includes(reasonCategory)) {
              await reject('reason category is required and must be valid when verdict is "problematic".');
              return;
            }

            // --- 3. Identity segments per category, and cross-check that
            // only the fields belonging to the chosen category were filled in.
            let identitySegments = null;
            let hacsOwner = null;

            const component = (fields["Component"] || "").trim();
            const ownerRepo = (fields["Owner/repo"] || "").trim();
            const manufacturerModel = (fields["Manufacturer/model"] || "").trim();
            const appSlug = (fields["App slug"] || "").trim();

            if (category === "home-assistant") {
              if (!["core", "supervisor", "os"].includes(component)) {
                await reject('component must be "core", "supervisor", or "os".');
                return;
              }
              identitySegments = [component];
            } else if (category === "hacs") {
              const parts = ownerRepo.split("/");
              if (parts.length !== 2 || !parts[0] || !parts[1]) {
                await reject('owner/repo must be in the format "owner/repo".');
                return;
              }
              hacsOwner = parts[0];
              identitySegments = parts;
            } else if (category === "devices") {
              const parts = manufacturerModel.split("/");
              if (parts.length !== 2 || !parts[0] || !parts[1]) {
                await reject('manufacturer/model must be in the format "manufacturer/model".');
                return;
              }
              identitySegments = parts;
            } else if (category === "apps") {
              if (!appSlug) {
                await reject("app slug is missing.");
                return;
              }
              identitySegments = [appSlug];
            }

            const dir = ["votes", category, ...identitySegments, version].join("/");
            const votePath = `${dir}/${author}.json`;
            const verdictPath = `${dir}/_verdict.json`;

            // --- 4. Duplicate check: create-only, 1 vote per person per version ---
            const existingVote = await readJson(votePath);
            if (existingVote) {
              await comment("You already voted on this version, this vote was not recorded again.");
              await closeIssue();
              return;
            }

            // --- 5. Asymmetric weight for the repo owner (hacs only) ---
            let weight = 1;
            if (hacsOwner && author.toLowerCase() === hacsOwner.toLowerCase() && verdict === "healthy") {
              weight = 0;
            }

            // --- 6. Write the vote file ---
            const voteData = {
              verdict,
              reason_category: verdict === "problematic" ? reasonCategory : null,
              notes: fields["Notes"] || null,
              link: fields["Issue or changelog link"] || null,
              weight,
              created_at: new Date().toISOString(),
            };
            await writeJson(votePath, voteData, `Vote from ${author}: ${category}/${identitySegments.join("/")}/${version}`);

            // --- 7. Recompute _verdict.json (only this one version directory, not the whole repo) ---
            const entries = await listDir(dir);
            let healthyCount = 0;
            let problematicCount = 0;
            for (const entry of entries) {
              if (entry.name === "_verdict.json" || entry.type !== "file") continue;
              const data = await readJson(entry.path);
              if (!data) continue;
              const w = typeof data.weight === "number" ? data.weight : 1;
              if (data.verdict === "healthy") healthyCount += w;
              else if (data.verdict === "problematic") problematicCount += w;
            }

            const siteConfig = (await readJson("config/site.json")) || { quorum: 3 };
            const quorum = siteConfig.quorum;
            const computedVerdict = {
              healthy_count: healthyCount,
              problematic_count: problematicCount,
              quorum,
              quorum_reached: healthyCount >= quorum,
              auto_install_eligible: problematicCount === 0 && healthyCount >= quorum,
              updated_at: new Date().toISOString(),
            };
            await writeJson(verdictPath, computedVerdict, `Verdict updated: ${category}/${identitySegments.join("/")}/${version}`);

            // --- 8. Close out ---
            await comment(
              `Thanks for your vote! Current standing for \`${category}/${identitySegments.join("/")}/${version}\`: ` +
              `${computedVerdict.healthy_count} healthy, ${computedVerdict.problematic_count} problematic ` +
              `(quorum: ${computedVerdict.quorum}).`
            );
            await closeIssue();
