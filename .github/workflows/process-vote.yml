name: Process vote

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'vote')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;
            const author = issue.user.login;

            async function comment(body) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issue.number, body,
              });
            }

            async function closeIssue() {
              await github.rest.issues.update({
                owner, repo, issue_number: issue.number, state: "closed",
              });
            }

            async function readJson(path) {
              try {
                const res = await github.rest.repos.getContent({ owner, repo, path });
                const content = Buffer.from(res.data.content, "base64").toString("utf8");
                return JSON.parse(content);
              } catch (err) {
                if (err.status === 404) return null;
                throw err;
              }
            }

            function sleep(ms) {
              return new Promise((resolve) => setTimeout(resolve, ms));
            }

            // Read-modify-write with retry on a conflicting write (someone else
            // wrote to this same file between our read and our write). One file
            // per destination version now holds every from-version jump's votes,
            // so two different people voting on two different jumps to the same
            // destination genuinely race on this same file -- this didn't used to
            // be possible when each vote lived in its own per-author file.
            // Refetches content + sha fresh on every attempt, so a losing writer's
            // own change is never lost: it just gets re-applied on top of the
            // winner's already-merged content next attempt. A small random delay
            // between attempts keeps two racing runs from retrying in lockstep and
            // colliding again every round. On true exhaustion (repeated conflicts,
            // or any non-conflict failure), this throws and the whole Action run
            // fails -- the triggering issue is simply left open/unprocessed, never
            // destroyed, same as any other exception in this workflow.
            async function writeJsonWithRetry(path, mutate, message, maxAttempts = 5) {
              for (let attempt = 0; attempt < maxAttempts; attempt++) {
                let sha;
                let current = null;
                try {
                  const existing = await github.rest.repos.getContent({ owner, repo, path });
                  sha = existing.data.sha;
                  current = JSON.parse(Buffer.from(existing.data.content, "base64").toString("utf8"));
                } catch (err) {
                  if (err.status !== 404) throw err;
                }
                const next = mutate(current);
                const content = Buffer.from(JSON.stringify(next, null, 2) + "\n").toString("base64");
                try {
                  await github.rest.repos.createOrUpdateFileContents({ owner, repo, path, message, content, sha });
                  return next;
                } catch (err) {
                  const isConflict = err.status === 409 || err.status === 422;
                  if (!isConflict || attempt === maxAttempts - 1) throw err;
                  await sleep(200 + Math.floor(Math.random() * 300));
                }
              }
            }

            // Issue Forms render each field as "### Label" followed by the
            // answer (or "_No response_" for an empty optional field). Labels
            // are kept deliberately clean in vote.yml (no parenthetical
            // instructions in the label text itself) so this split stays
            // simple.
            function parseFields(body) {
              const fields = {};
              const blocks = body.split(/\n(?=### )/);
              for (const block of blocks) {
                const m = block.match(/^### (.+?)\n([\s\S]*)$/);
                if (!m) continue;
                const label = m[1].trim();
                let value = m[2].trim();
                if (value === "_No response_") value = "";
                fields[label] = value;
              }
              return fields;
            }

            // --- 1. Banned check ---
            const banned = (await readJson("moderation/banned-users.json")) || [];
            if (banned.map((u) => u.toLowerCase()).includes(author.toLowerCase())) {
              await comment("This account is not allowed to submit votes.");
              await closeIssue();
              return;
            }

            // A leading v/V immediately before a digit is stripped, so a
            // human-typed "1.2.3" and one derived from a GitHub release tag
            // "v1.2.3" land on the exact same vote path either way. Kept in
            // sync with ha-update-manager's own hacs_identity.py, found
            // live 2026-07-22 (see that module's own comment for how this
            // was discovered). Applied to both endpoints of the jump now,
            // not just the destination -- from_version most often comes
            // from an update entity's own installed_version attribute,
            // which is just as likely to carry a stray "v" prefix.
            function normalizeVersion(version) {
              const m = version.match(/^[vV](\d.*)$/);
              return m ? m[1] : version;
            }

            // --- 2. Parse ---
            const fields = parseFields(issue.body || "");
            const category = (fields["Category"] || "").trim();
            const fromVersion = normalizeVersion((fields["From version"] || "").trim());
            const toVersion = normalizeVersion((fields["To version"] || "").trim());
            const verdict = (fields["Verdict"] || "").trim();
            const reasonCategory = (fields["Reason category"] || "").trim();

            const VALID_CATEGORIES = ["home-assistant", "hacs", "devices", "apps"];
            const VALID_VERDICTS = ["healthy", "problematic"];
            const VALID_REASONS = [
              "broken functionality",
              "requires a newer HA version",
              "is a dev/pre-release build",
              "breaking change",
              "other",
            ];

            async function reject(reason) {
              await comment(`This vote could not be processed: ${reason}`);
              await closeIssue();
            }

            if (!VALID_CATEGORIES.includes(category)) {
              await reject(`unknown category "${category}".`);
              return;
            }
            if (!fromVersion) {
              await reject("from version is missing.");
              return;
            }
            if (!toVersion) {
              await reject("to version is missing.");
              return;
            }
            if (!VALID_VERDICTS.includes(verdict)) {
              await reject(`unknown verdict "${verdict}".`);
              return;
            }
            if (verdict === "problematic" && !VALID_REASONS.includes(reasonCategory)) {
              await reject('reason category is required and must be valid when verdict is "problematic".');
              return;
            }

            // --- 3. Identity segments per category, and cross-check that
            // only the fields belonging to the chosen category were filled in.
            let identitySegments = null;
            let hacsOwner = null;

            const component = (fields["Component"] || "").trim();
            const ownerRepo = (fields["Owner/repo"] || "").trim();
            const manufacturerModel = (fields["Manufacturer/model"] || "").trim();
            const appSlug = (fields["App slug"] || "").trim();

            if (category === "home-assistant") {
              if (!["core", "supervisor", "os"].includes(component)) {
                await reject('component must be "core", "supervisor", or "os".');
                return;
              }
              identitySegments = [component];
            } else if (category === "hacs") {
              const parts = ownerRepo.split("/");
              if (parts.length !== 2 || !parts[0] || !parts[1]) {
                await reject('owner/repo must be in the format "owner/repo".');
                return;
              }
              hacsOwner = parts[0];
              identitySegments = parts;
            } else if (category === "devices") {
              const parts = manufacturerModel.split("/");
              if (parts.length !== 2 || !parts[0] || !parts[1]) {
                await reject('manufacturer/model must be in the format "manufacturer/model".');
                return;
              }
              identitySegments = parts;
            } else if (category === "apps") {
              if (!appSlug) {
                await reject("app slug is missing.");
                return;
              }
              identitySegments = [appSlug];
            }

            // One flat file per destination version, holding every jump
            // (from_version) that's ever been rated for it -- see the
            // repo's own README for why this is one file rather than one
            // per jump or one per voter.
            const toVersionPath = ["votes", category, ...identitySegments, `${toVersion}.json`].join("/");

            // --- 4. Asymmetric weight for the repo owner (hacs only) ---
            let weight = 1;
            if (hacsOwner && author.toLowerCase() === hacsOwner.toLowerCase() && verdict === "healthy") {
              weight = 0;
            }

            const siteConfig = (await readJson("config/site.json")) || { quorum: 3 };
            const quorum = siteConfig.quorum;

            // --- 5. Merge this vote into its jump within the to_version file,
            // recompute just that jump's own verdict, and write the whole file
            // back (retried on a conflicting concurrent write, see
            // writeJsonWithRetry's own docstring). isVoteUpdate is set inside
            // the mutator so it always reflects the freshest read, even if a
            // conflict forced a retry. ---
            let isVoteUpdate = false;
            const result = await writeJsonWithRetry(
              toVersionPath,
              (current) => {
                const data = current || { jumps: {} };
                if (!data.jumps[fromVersion]) data.jumps[fromVersion] = { votes: {}, verdict: null };
                const jump = data.jumps[fromVersion];
                const existingVote = jump.votes[author];
                isVoteUpdate = !!existingVote;
                // created_at is kept from the original vote on this jump, not
                // reset, so it still records when this person first weighed
                // in; updated_at is only ever set once there's actually been
                // a second vote to update it with.
                jump.votes[author] = {
                  verdict,
                  reason_category: verdict === "problematic" ? reasonCategory : null,
                  notes: fields["Notes"] || null,
                  link: fields["Issue or changelog link"] || null,
                  weight,
                  created_at: (existingVote && existingVote.created_at) || new Date().toISOString(),
                  updated_at: isVoteUpdate ? new Date().toISOString() : null,
                };
                let healthyCount = 0;
                let problematicCount = 0;
                for (const v of Object.values(jump.votes)) {
                  const w = typeof v.weight === "number" ? v.weight : 1;
                  if (v.verdict === "healthy") healthyCount += w;
                  else if (v.verdict === "problematic") problematicCount += w;
                }
                jump.verdict = {
                  healthy_count: healthyCount,
                  problematic_count: problematicCount,
                  quorum,
                  quorum_reached: healthyCount >= quorum,
                  auto_install_eligible: problematicCount === 0 && healthyCount >= quorum,
                  updated_at: new Date().toISOString(),
                };
                return data;
              },
              `${author} voted on ${category}/${identitySegments.join("/")}: ${fromVersion} -> ${toVersion}`
            );

            // --- 6. Close out ---
            const computedVerdict = result.jumps[fromVersion].verdict;
            await comment(
              (isVoteUpdate ? "Your vote has been updated. " : "Thanks for your vote! ") +
              `Current standing for \`${category}/${identitySegments.join("/")}\` (${fromVersion} -> ${toVersion}): ` +
              `${computedVerdict.healthy_count} healthy, ${computedVerdict.problematic_count} problematic ` +
              `(quorum: ${computedVerdict.quorum}).`
            );
            await closeIssue();
