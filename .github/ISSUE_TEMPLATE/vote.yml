name: Cast a vote
description: Share your verdict on an update (healthy or problematic)
title: "[vote] "
labels:
  - vote
body:
  - type: markdown
    attributes:
      value: |
        Fill in only the fields that belong to the category you pick, leave the rest empty.
        A community verdict is a collected opinion, not a guarantee, especially for
        safety-relevant devices (locks, alarms, smoke detectors). See the root README
        for the full disclaimer.

        Changed your mind since an earlier vote on this same version jump? Just vote again,
        it replaces your previous one instead of being rejected as a duplicate.

        A verdict is about a specific jump (the version you upgraded from, and the one you
        landed on), not just the destination version -- going from 0.1.0 to 3.5.2 can carry
        very different risk than going from 3.5.1 to 3.5.2, even though both land on the
        same version.

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What kind of update is this?
      options:
        - home-assistant
        - hacs
        - devices
        - apps
    validations:
      required: true

  - type: input
    id: component
    attributes:
      label: Component
      description: 'Only for category "home-assistant": core, supervisor, or os'
      placeholder: core

  - type: input
    id: owner_repo
    attributes:
      label: Owner/repo
      description: 'Only for category "hacs". Format: owner/repo, e.g. HA-Update-Manager/ha-update-manager'
      placeholder: owner/repo

  - type: input
    id: manufacturer_model
    attributes:
      label: Manufacturer/model
      description: 'Only for category "devices". Format: manufacturer/model'
      placeholder: manufacturer/model

  - type: input
    id: app_slug
    attributes:
      label: App slug
      description: 'Only for category "apps"'
      placeholder: my-app-slug

  - type: input
    id: from_version
    attributes:
      label: From version
      description: The version you upgraded from
      placeholder: 3.5.1
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: To version
      description: The version you landed on -- this verdict is about that specific jump, not the version alone
      placeholder: 3.5.2
    validations:
      required: true

  - type: dropdown
    id: verdict
    attributes:
      label: Verdict
      options:
        - healthy
        - problematic
    validations:
      required: true

  - type: dropdown
    id: reason_category
    attributes:
      label: Reason category
      description: 'Required when verdict is "problematic"'
      options:
        - (not applicable, verdict is healthy)
        - broken functionality
        - requires a newer HA version
        - is a dev/pre-release build
        - breaking change
        - other

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Free text, encouraged for "broken functionality"

  - type: input
    id: link
    attributes:
      label: Issue or changelog link
      placeholder: "https://github.com/.../issues/123"
