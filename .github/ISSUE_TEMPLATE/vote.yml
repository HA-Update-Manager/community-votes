name: Cast a vote
description: Share your verdict on an update (healthy or problematic)
title: "[vote] "
labels:
  - vote
body:
  - type: markdown
    attributes:
      value: |
        Fill in only the fields that belong to the category you pick, leave the rest empty.
        A community verdict is a collected opinion, not a guarantee, especially for
        safety-relevant devices (locks, alarms, smoke detectors). See the root README
        for the full disclaimer.

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What kind of update is this?
      options:
        - home-assistant
        - hacs
        - devices
        - apps
    validations:
      required: true

  - type: input
    id: component
    attributes:
      label: Component
      description: 'Only for category "home-assistant": core, supervisor, or os'
      placeholder: core

  - type: input
    id: owner_repo
    attributes:
      label: Owner/repo
      description: 'Only for category "hacs". Format: owner/repo, e.g. HA-Update-Manager/ha-update-manager'
      placeholder: owner/repo

  - type: input
    id: manufacturer_model
    attributes:
      label: Manufacturer/model
      description: 'Only for category "devices". Format: manufacturer/model'
      placeholder: manufacturer/model

  - type: input
    id: app_slug
    attributes:
      label: App slug
      description: 'Only for category "apps"'
      placeholder: my-app-slug

  - type: input
    id: version
    attributes:
      label: Version
      description: The version this verdict is about
      placeholder: 1.2.3
    validations:
      required: true

  - type: dropdown
    id: verdict
    attributes:
      label: Verdict
      options:
        - healthy
        - problematic
    validations:
      required: true

  - type: dropdown
    id: reason_category
    attributes:
      label: Reason category
      description: 'Required when verdict is "problematic"'
      options:
        - (not applicable, verdict is healthy)
        - broken functionality
        - requires a newer HA version
        - is a dev/pre-release build
        - breaking change
        - other

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Free text, encouraged for "broken functionality"

  - type: input
    id: link
    attributes:
      label: Issue or changelog link
      placeholder: "https://github.com/.../issues/123"
